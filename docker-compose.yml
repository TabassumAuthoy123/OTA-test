version: '3.8'

services:

  # ── PHP Laravel App ──────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: otaplatform_app
    restart: unless-stopped
    working_dir: /var/www
    env_file:
      - .env.docker
    volumes:
      - .:/var/www
      # Preserve vendor & bootstrap/cache from the image (not the host)
      - vendor_data:/var/www/vendor
      - cache_data:/var/www/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - otaplatform

  # ── Nginx Web Server ─────────────────────────
  nginx:
    image: nginx:alpine
    container_name: otaplatform_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - otaplatform

  # ── MySQL Database ───────────────────────────
  mysql:
    image: mysql:8.0
    container_name: otaplatform_mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: otaplatform
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: otauser
      MYSQL_PASSWORD: otapass
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - otaplatform

  # ── phpMyAdmin (DB GUI) ───────────────────────
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: otaplatform_pma
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - otaplatform

networks:
  otaplatform:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  vendor_data:
    driver: local
  cache_data:
    driver: local
